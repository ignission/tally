name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # actions/checkout@v6.0.0 の commit SHA に固定（supply chain 対策）
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # jdx/mise-action@v4 の commit SHA に固定
      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
